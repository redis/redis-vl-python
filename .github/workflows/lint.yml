name: Lint

on:
  pull_request:
  push:
    branches:
      - main

env:
  UV_VERSION: "0.7.13"

jobs:
  check:
    name: Style-check ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Only lint on the minimum supported Python version and a representative
        # set of newer releases. Lint issues that differ by minor version are
        # extremely unlikely to appear only on an untested intermediate version.
        #
        # GitHub rate-limits how many jobs can be running at any one time.
        # Starting new jobs is also relatively slow,
        # so linting on fewer versions makes CI faster.
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
    - name: Check out repository
      uses: actions/checkout@v6

    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: ${{ env.UV_VERSION }}
        enable-cache: true
        python-version: ${{ matrix.python-version }}   # sets UV_PYTHON
        cache-dependency-glob: |
          pyproject.toml
          uv.lock

    - name: Install dependencies
      run: |
        uv sync --all-extras --frozen

    - name: check-sort-import
      run: |
        make check-sort-imports

    - name: check-black-format
      run: |
        make check-format

    - name: check-mypy
      run: |
        make check-types
